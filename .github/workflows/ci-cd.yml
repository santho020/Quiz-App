name: CI-CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose -f docker-compose.yml build

  e2e-selenium:
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-unit, docker-build]
    steps:
      - uses: actions/checkout@v4
      - name: Start Docker stack
        run: docker compose -f docker-compose.yml up -d --build
      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5000/api/health >/dev/null && curl -fsS http://localhost:5173 >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Selenium
        run: python -m pip install --upgrade pip && python -m pip install -r tests/e2e/requirements.txt
      - name: Run Selenium smoke test
        env:
          BACKEND_URL: http://localhost:5000
          FRONTEND_URL: http://localhost:5173
        run: python tests/e2e/selenium_smoke.py
      - name: Shut down Docker stack
        if: always()
        run: docker compose -f docker-compose.yml down

  deploy:
    runs-on: ubuntu-latest
    needs: e2e-selenium
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build production images
        run: docker compose -f docker-compose.yml build
      - name: Placeholder deploy step
        run: |
          echo "Add your real deploy target here."
          echo "For example: SSH into a VPS that has Docker installed and run docker compose up -d."
